# fly.toml — Fly.io config cho TykBot

app = "tykbot"           # ← Đổi tên app của bạn ở đây
primary_region = "sin"   # Singapore — gần VN nhất

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"

# Bot Discord không cần HTTP server → tắt auto_stop
[http_service]
  auto_stop_machines  = false
  auto_start_machines = true
  min_machines_running = 1

[checks]
  # Không cần health check HTTP vì đây là bot (long-running process)

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
