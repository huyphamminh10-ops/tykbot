# fly.toml — Fly.io config cho TykBot

app = "tykbot-xufb6g"
primary_region = "sin"   # Singapore — gần VN nhất

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"

# Bot Discord không cần HTTP server
# Dùng processes thay vì http_service để tránh health-check crash
[processes]
  app = "node src/index.js"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
